# Configuración para deploy en Fly.io
app = "finanzaspro-bot"
primary_region = "mia"  # Miami — más cercano a Latinoamérica

[build]

[env]
  # Las variables sensibles se configuran con: fly secrets set KEY=VALUE

[[services]]
  # El bot usa long polling, no necesita un puerto HTTP expuesto
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
